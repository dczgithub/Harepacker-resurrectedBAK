name: Build Windows x64

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive # 新增：拉取子模块

      - name: Restore NuGet packages
        run: msbuild Harepacker.sln -t:Restore -p:Configuration=Release

      - name: Build & Publish x64 Release
        run: msbuild Harepacker.sln -t:Publish -p:Configuration=Release;Platform=x64;PublishDir=./publish

      - name: Zip binaries
        run: Compress-Archive -Path ./publish/* -DestinationPath Harepacker-x64.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Harepacker-x64
          path: Harepacker-x64.zip
