#!/bin/bash

# 1. 检查是否存在子目录
SUB_DIR="Harepacker-resurrected"

if [ ! -d "$SUB_DIR" ]; then
    echo "错误：未找到 $SUB_DIR 目录。请确保在仓库根目录执行此脚本。"
    exit 1
fi

echo "进入项目子目录..."
cd "$SUB_DIR" || exit

# 2. 检查是否有本地 lib 库
# 如果项目依赖本地 jar 包，Maven 需要先安装这些包
if [ -d "lib" ]; then
    echo "检测到 lib 文件夹，正在安装本地依赖..."
    # 这是一个示例，如果你的 lib 下有特定的 jar，需要通过 install-file 安装
    # mvn install:install-file -Dfile=lib/xxx.jar -DgroupId=com.example -DartifactId=xxx -Dversion=1.0 -Dpackaging=jar
fi

# 3. 执行编译
echo "正在开始 Maven 编译任务..."
mvn clean package -DskipTests

# 4. 检查结果
if [ $? -eq 0 ]; then
    echo "------------------------------------------"
    echo "编译完成！"
    echo "生成的 JAR 文件位置:"
    find . -name "*.jar" | grep "target"
else
    echo "编译失败，请检查上面的错误日志。"
fi
