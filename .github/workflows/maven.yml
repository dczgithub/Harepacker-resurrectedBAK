name: Java CI with Maven

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 在这里指定工作目录，这样后续的 mvn 命令都会自动在该目录下执行
    defaults:
      run:
        working-directory: Harepacker-resurrected

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Build with Maven
        # 因为设置了 defaults，这里不需要写路径，直接运行即可
        run: mvn clean package -DskipTests
