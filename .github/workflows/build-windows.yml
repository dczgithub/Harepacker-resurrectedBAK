name: Build Windows x64
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout source & submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Locate MSBuild
        id: locate_msbuild
        run: |
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $msbuildPath = & $vsWhere -latest -products * -requires Microsoft.Component.MSBuild -find "MSBuild\**\Bin\MSBuild.exe" | Select-Object -First 1
          echo "MSBUILD_PATH=$msbuildPath" >> $env:GITHUB_ENV

      - name: Restore NuGet packages
        run: & "${env:MSBUILD_PATH}" Harepacker.sln -t:Restore -p:Configuration=Release

      - name: Build Release x64
        run: & "${env:MSBUILD_PATH}" Harepacker.sln -t:Build -p:Configuration=Release;Platform=x64

      - name: Zip compiled binaries
        run: Compress-Archive -Path ./HaRepacker/bin/x64/Release/* -DestinationPath Harepacker-x64.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Harepacker-x64
          path: Harepacker-x64.zip
